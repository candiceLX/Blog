lass="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br><span class="line">155</span><br><span class="line">156</span><br><span class="line">157</span><br><span class="line">158</span><br><span class="line">159</span><br><span class="line">160</span><br><span class="line">161</span><br><span class="line">162</span><br><span class="line">163</span><br><span class="line">164</span><br><span class="line">165</span><br><span class="line">166</span><br><span class="line">167</span><br><span class="line">168</span><br><span class="line">169</span><br><span class="line">170</span><br><span class="line">171</span><br><span class="line">172</span><br><span class="line">173</span><br><span class="line">174</span><br><span class="line">175</span><br><span class="line">176</span><br><span class="line">177</span><br><span class="line">178</span><br><span class="line">179</span><br><span class="line">180</span><br><span class="line">181</span><br><span class="line">182</span><br><span class="line">183</span><br></pre></td><td class="code"><pre><span class="line"># 使用cdn</span><br><span class="line"></span><br><span class="line">&lt;\script src=&quot;app.js&quot;&gt;&lt;\/script&gt; 一定要应用在body后面</span><br><span class="line">引用cdn  实例化对象  在页面中创建根容器</span><br><span class="line"></span><br><span class="line">~ el: element需要获取的元素,一定是html中的根容器元素</span><br><span class="line"></span><br><span class="line">  data: 用于存储数据</span><br><span class="line"></span><br><span class="line">~  methods: 用于存储各种方法 里面可以字符拼接 也可以直接this. 去拿实例化中其他的vue对象 (一旦触发其中一个方法 methods里面所有的方法都会执行一遍)</span><br><span class="line"></span><br><span class="line">~computed:计算属性 (比methods性能要好 只执行指定方法) 但是它操作的是虚拟dom所以只有耗时大量计算如搜索这种才会用computed</span><br><span class="line"></span><br><span class="line">~ 给属性绑定data中的值 在属性前加上v-bind:</span><br><span class="line"></span><br><span class="line">~ 给页面中插入data中定义的结构  在要插入的标签前括号中v-  html=&quot;websideTag&quot;</span><br><span class="line"></span><br><span class="line">在页面中直接操作改变数据 写在标签身上一般不这么做 v-on:click=&quot;age++&quot;</span><br><span class="line">单击v-on:click= &quot; &quot;   双击v-on:dblclick=&quot; &quot;   移动v-on:mousemove=&quot;&quot;</span><br><span class="line">v-on: 可以简略为@ 如 @click=&quot;&quot;</span><br><span class="line"></span><br><span class="line">事件修饰符 在事件后加 .修饰符 </span><br><span class="line">如@click.once=&quot; &quot;   </span><br><span class="line">.stop阻止事件继续传播  </span><br><span class="line">.prevent阻止默认事件 </span><br><span class="line">.once只触发一次</span><br><span class="line"></span><br><span class="line">键值修饰符 v-on:keyup.enter=&quot;&quot;  也可以连续条件 v-on:keyup.alt.enter=&quot;&quot;</span><br><span class="line"></span><br><span class="line"># 双向数据绑定 </span><br><span class="line"></span><br><span class="line">一定是要有输入和输出的地方 所以一定会是和input select textarea 这三个有关  </span><br><span class="line">1.给输出的标签绑定v-model=&quot;name&quot;,当标签内容发生变化 name的值同时改变 如果data中声明了变量text 那么v-model=&quot;text&quot; input的value值就赋给了text</span><br><span class="line">2.(ref用于标记 在input标签身上标记ref=&quot;name&quot; 那么在js中取this.$refs.name就选择到了那个input  那么this.$refs.name.value就拿到了那个input的value值)</span><br><span class="line"></span><br><span class="line">结构中调用方法&#123;&#123; methods() &#125;&#125;  如果是事件触发v-on:click=&quot;methods()&quot;</span><br><span class="line">结构中调用computed  直接&#123;&#123; computed &#125;&#125;不需要()</span><br><span class="line">结构中调用data  &#123;&#123; data &#125;&#125;  如果是 插入标签v-html=&quot;websideTag&quot;   更改属性v-bind:href=&quot;data&quot;</span><br><span class="line">data v值是false true时不需要””  changcolor:false,   changleng:false</span><br><span class="line">可再标签身上直接写v-on:click=&quot;data = !data&quot;   v-on:click=&quot;data++&quot;</span><br><span class="line"></span><br><span class="line"># 动态加载css的时候  用方法操作类 </span><br><span class="line"></span><br><span class="line">v-bind:class=&quot; data / methods() /  computed&quot;    </span><br><span class="line">v-bind:class=&quot;&#123;changImg:change&#125;&quot;</span><br><span class="line">v-show=&quot;!change&quot;</span><br><span class="line">v-bind:style=&quot;&#123;width:reduce + &apos;%&apos;&#125;&quot;</span><br><span class="line">v-on:click=&quot;bobo()&quot;</span><br><span class="line">v-if 不占位 在dom结构中不存在  v-show占位存在</span><br><span class="line"></span><br><span class="line">v-for=&quot;(value, key, index) in object&quot;  写在模版template 上 template是不会被渲染出来的  </span><br><span class="line">&lt;\li&gt; &#123;&#123;value&#125;&#125; / &#123;&#123;index&#125;&#125; / &#123;&#123;value.key&#125;&#125; &lt;\/li&gt;</span><br><span class="line"></span><br><span class="line">实例化两个对象 在js中也可以去操控另一个对象里面的内容one.title=&quot;改变one对象里面的title内容&quot;</span><br><span class="line"></span><br><span class="line"># 路由 须先安装通过cd命令进入项目目录里 </span><br><span class="line"></span><br><span class="line">执行以下命令  cnpm install vue-router --save</span><br><span class="line">路由不需要重新请求和整个页面的刷新就可以去到要去的页面</span><br><span class="line"></span><br><span class="line">1. 先在main.js引入路由模块 使用路由模块</span><br><span class="line">import VueRouter from &apos;vue-router&apos;  //1.引入vue-router</span><br><span class="line">Vue.use(VueRouter)</span><br><span class="line"></span><br><span class="line">2. 配置路由</span><br><span class="line">var router = new VueRouter(&#123;</span><br><span class="line">	routes:[</span><br><span class="line">		&#123;path:&apos;/&apos;,component:Home&#125;,</span><br><span class="line">		&#123;path:&apos;/helloworld&apos;,component:HelloWorld&#125;</span><br><span class="line">	],</span><br><span class="line">	mode:&quot;history&quot; //6配置另一个属性去掉网址中#/</span><br><span class="line">&#125;)</span><br><span class="line"></span><br><span class="line">3. 定义路由     在el: &apos;#app&apos;, 后面写上 router,  </span><br><span class="line"></span><br><span class="line">4. 导入路由中相关组件</span><br><span class="line">import Home from &apos;./components/Home&apos;</span><br><span class="line">import HelloWorld from &apos;./components/HelloWorld&apos;</span><br><span class="line"></span><br><span class="line">6. 配置另一个属性去掉网址中#/  mode:&quot;history&quot;</span><br><span class="line"></span><br><span class="line">7. 跳转 &lt;\router-link to=&quot;/lixin&quot;&gt;lixin User组件&lt;\/router-link&gt;   一定要在路由末尾加上&lt;\router-view&gt;&lt;\/router-view&gt;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"># http请求</span><br><span class="line"></span><br><span class="line">1. http请求 和路由的使用方法差不多通过cd命令进入项目目录里</span><br><span class="line">	执行以下命令 cnpm install vue-resource --save </span><br><span class="line"></span><br><span class="line">2.  第一二步和路由一样 在main.js里面引用和使用</span><br><span class="line">  import VueResource from &apos;vue-resource&apos;</span><br><span class="line">  Vue.use(VueResource)</span><br><span class="line"></span><br><span class="line">3. 在需要http请求的组件中写</span><br><span class="line">created()&#123;  //在页面显示前拿到数据</span><br><span class="line">      this.$http.get(&quot;http://jsonplaceholder.typicode.com/users&quot;)</span><br><span class="line">      .then((data) =&gt;&#123;  //如果请求到数据会执行一个.then函数</span><br><span class="line">          console.log(data);</span><br><span class="line">          this.conten = data.body  //把数据赋给以声明的变量</span><br><span class="line">      &#125;)</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">测试数据API    http://jsonplaceholder.typicode.com</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">提交表单中会自动刷新页面所以 阻止默认事件需要加 e.preventDefault();</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">data()&#123; return&#123;&#125; &#125;</span><br><span class="line"></span><br><span class="line"># props 属性 父组件向子组件传值 两个组件之间的传值很常用</span><br><span class="line">在子组件 定义属性props:&#123;</span><br><span class="line">			content:&#123;</span><br><span class="line">				type:String,</span><br><span class="line">				default:&apos;默认就是当前文字&apos;</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">也可以简单定义 props:[ </span><br><span class="line">TranslationTxt</span><br><span class="line">               ]</span><br><span class="line">在父组件 调用组件标签的身上绑定修改&lt;Vif v-bind:content=&quot;向子组件传值&quot;&gt;&lt;\/Vif&gt;</span><br><span class="line"></span><br><span class="line">在父组件 调用组件标签的身上绑定修改&lt;Vif  v-text=&quot;向子组件传值TranslationTxt &quot;&gt;&lt;\/Vif&gt;   子组件则直接使用模板即可拿到数据&#123;&#123; TranslationTxt &#125;&#125;</span><br><span class="line"></span><br><span class="line">传值:string number boolean 不会改变全局</span><br><span class="line">传引用:array object  数据被改变那么所有组件中引用的都会被改变</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"># 子组件向父组件传值</span><br><span class="line"></span><br><span class="line">1. 在子组件中用$emit()注册一个事件</span><br><span class="line">  this.$emit(“formclick”,this.data)  formclick是定义的方法名称 </span><br><span class="line">  this.data 是传过去的数据内容</span><br><span class="line"></span><br><span class="line">2. 在App.vue中的对应子组件绑定 :</span><br><span class="line">  &lt;Formm v-on:formclick=&quot;newfuncti&quot; /&gt;</span><br><span class="line"></span><br><span class="line">3. 在App.vue的methods 中 实现这个方法 </span><br><span class="line">newfuncti:function(text)&#123; </span><br><span class="line">    alert(text)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"># 新建组件的步骤 :  模板里面有且只有一个跟标签</span><br><span class="line"></span><br><span class="line">1. 新建一个文件名如:Test 一般首字母大写 </span><br><span class="line"></span><br><span class="line">2. 里面的结构用 template 标签包裹 底下有且只能有一个父标签</span><br><span class="line"></span><br><span class="line">3. js部分 export default &#123; name:&quot;Test&quot;,&#125;</span><br><span class="line"></span><br><span class="line">4. css部分 给style标签加上 scoped 声明作用域</span><br><span class="line"></span><br><span class="line">5. 然后到App.vue中 注册 import Test from &apos;./components/Test.vue&apos; 加不加.vue都可以</span><br><span class="line"></span><br><span class="line">6. 引用 components:&#123; Test&#125;   接着就可以使用了 &lt;Test/&gt; 名字和引用的一样 用单标签</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"># 以下是生命周期 钩子函数</span><br><span class="line">    beforeCreate:function()&#123;</span><br><span class="line">      alert(&quot;组件实例化之前执行的函数&quot;)</span><br><span class="line">    &#125;,</span><br><span class="line">    created:function()&#123;</span><br><span class="line">      alert(&quot;组件实例化完毕,但页面还未显示&quot;)</span><br><span class="line">    &#125;,</span><br><span class="line">    beforeMount:function()&#123;</span><br><span class="line">      alert(&quot;组件挂在前,页面仍未展示,但虚拟Dom已经配置&quot;)</span><br><span class="line">    &#125;,</span><br><span class="line">    mounted:function()&#123;</span><br><span class="line">      alert(&quot;组件挂在后,此方法执行后,页面显示&quot;)</span><br><span class="line">    &#125;,</span><br><span class="line">    beforeUpdate:function()&#123;</span><br><span class="line">      console.log(&quot;组件更新前,页面仍未更新,但虚拟Dom已经配置&quot;)</span><br><span class="line">    &#125;,</span><br><span class="line">    updated:function()&#123;</span><br><span class="line">      console.log(&quot;组件更新,此方法执行后,页面显示&quot;)</span><br><span class="line">    &#125;,</span><br><span class="line">    beforeDestroy:function()&#123;</span><br><span class="line">      console.log(&quot;组件销毁前&quot;)</span><br><span class="line">    &#125;,</span><br><span class="line">    destroyed:function()&#123;</span><br><span class="line">      console.log(&quot;组件销毁&quot;)</span><br><span class="line">    &#125;</span><br></pre></td></tr></table></figure>

  <script type="text/javascript">
    // Popup Window;
    var isfetched = false;
    var isXml = true;
    // Search DB path;
    var search_path = "search.xml";
    if (search_path.length === 0) {
      search_path = "search.xml";
    } else if (/json$/i.test(search_path)) {
      isXml = false;
    }
    var path = "/" + search_path;
    // monitor main search box;

    var onPopupClose = function (e) {
      $('.popup').hide();
      $('#local-search-input').val('');
      $('.search-result-list').remove();
      $('#no-result').remove();
      $(".local-search-pop-overlay").remove();
      $('body').css('overflow', '');
    }

    function proceedsearch() {
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay"></div>')
        .css('overflow', 'hidden');
      $('.search-popup-overlay').click(onPopupClose);
      $('.popup').toggle();
      var $localSearchInput = $('#local-search-input');
      $localSearchInput.attr("autocapitalize", "none");
      $localSearchInput.attr("autocorrect", "off");
      $localSearchInput.focus();
    }

    // search function;
    var searchFunc = function(path, search_id, content_id) {
      'use strict';

      // start loading animation
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay">' +
          '<div id="search-loading-icon">' +
          '<i class="fa fa-spinner fa-pulse fa-5x fa-fw"></i>' +
          '</div>' +
          '</div>')
        .css('overflow', 'hidden');
      $("#search-loading-icon").css('margin', '20% auto 0 auto').css('text-align', 'center');

      

      $.ajax({
        url: path,
        dataType: isXml ? "xml" : "json",
        async: true,
        success: function(res) {
          // get the contents from search data
          isfetched = true;
          $('.popup').detach().appendTo('.header-inner');
          var datas = isXml ? $("entry", res).map(function() {
            return {
              title: $("title", this).text(),
              content: $("content",this).text(),
              url: $("url" , this).text()
            };
          }).get() : res;
          var input = document.getElementById(search_id);
          var resultContent = document.getElementById(content_id);
          var inputEventFunction = function() {
            var searchText = input.value.trim().toLowerCase();
            var keywords = searchText.split(/[\s\-]+/);
            if (keywords.length > 1) {
              keywords.push(searchText);
            }
            var resultItems = [];
            if (searchText.length > 0) {
              // perform local searching
              datas.forEach(function(data) {
                var isMatch = false;
                var hitCount = 0;
                var searchTextCount = 0;
                var title = data.title.trim();
                var titleInLowerCase = title.toLowerCase();
                var content = data.content.trim().replace(/<[^>]+>/g,"");
                
                var contentInLowerCase = content.toLowerCase();
                var articleUrl = decodeURIComponent(data.url);
                var indexOfTitle = [];
                var indexOfContent = [];
                // only match articles with not empty titles
                if(title != '') {
                  keywords.forEach(function(keyword) {
                    function getIndexByWord(word, text, caseSensitive) {
                      var wordLen = word.length;
                      if (wordLen === 0) {
                        return [];
                      }
                      var startPosition = 0, position = [], index = [];
                      if (!caseSensitive) {
                        text = text.toLowerCase();
                        word = word.toLowerCase();
                      }
                      while ((position = text.indexOf(word, startPosition)) > -1) {
                        index.push({position: position, word: word});
                        startPosition = position + wordLen;
                      }
                      return index;
                    }

                    indexOfTitle = indexOfTitle.concat(getIndexByWord(keyword, titleInLowerCase, false));
                    indexOfContent = indexOfContent.concat(getIndexByWord(keyword, contentInLowerCase, false));
                  });
                  if (indexOfTitle.length > 0 || indexOfContent.length > 0) {
                    isMatch = true;
                    hitCount = indexOfTitle.length + indexOfContent.length;
                  }
                }

                // show search results

                if (isMatch) {
                  // sort index by position of keyword

                  [indexOfTitle, indexOfContent].forEach(function (index) {
                    index.sort(function (itemLeft, itemRight) {
                      if (itemRight.position !== itemLeft.position) {
                        return itemRight.position - itemLeft.position;
                      } else {
                        return itemLeft.word.length - itemRight.word.length;
                      }
                    });
                  });

                  // merge hits into slices

                  function mergeIntoSlice(text, start, end, index) {
                    var item = index[index.length - 1];
                    var position = item.position;
                    var word = item.word;
                    var hits = [];
                    var searchTextCountInSlice = 0;
                    while (position + word.length <= end && index.length != 0) {
                      if (word === searchText) {
                        searchTextCountInSlice++;
                      }
                      hits.push({position: position, length: word.length});
                      var wordEnd = position + word.length;

                      // move to next position of hit

                      index.pop();
                      while (index.length != 0) {
                        item = index[index.length - 1];
                        position = item.position;
                        word = item.word;
                        if (wordEnd > position) {
                          index.pop();
                        } else {
                          break;
                        }
                      }
                    }
                    searchTextCount += searchTextCountInSlice;
                    return {
                      hits: hits,
                      start: start,
                      end: end,
                      searchTextCount: searchTextCountInSlice
                    };
                  }

                  var slicesOfTitle = [];
                  if (indexOfTitle.length != 0) {
                    slicesOfTitle.push(mergeIntoSlice(title, 0, title.length, indexOfTitle));
                  }

                  var slicesOfContent = [];
                  while (indexOfContent.length != 0) {
                    var item = indexOfContent[indexOfContent.length - 1];
                    var position = item.position;
                    var word = item.word;
                    // cut out 100 characters
                    var start = position - 20;
                    var end = position + 80;
                    if(start < 0){
                      start = 0;
                    }
                    if (end < position + word.length) {
                      end = position + word.length;
                    }
                    if(end > content.length){
                      end = content.length;
                    }
                    slicesOfContent.push(mergeIntoSlice(content, start, end, indexOfContent));
                  }

                  // sort slices in content by search text's count and hits' count

                  slicesOfContent.sort(function (sliceLeft, sliceRight) {
                    if (sliceLeft.searchTextCount !== sliceRight.searchTextCount) {
                      return sliceRight.searchTextCount - sliceLeft.searchTextCount;
                    } else if (sliceLeft.hits.length !== sliceRight.hits.length) {
                      return sliceRight.hits.length - sliceLeft.hits.length;
                    } else {
                      return sliceLeft.start - sliceRight.start;
                    }
                  });

                  // select top N slices in content

                  var upperBound = parseInt('1');
                  if (upperBound >= 0) {
                    slicesOfContent = slicesOfContent.slice(0, upperBound);
                  }

                  // highlight title and content

                  function highlightKeyword(text, slice) {
                    var result = '';
                    var prevEnd = slice.start;
                    slice.hits.forEach(function (hit) {
                      result += text.substring(prevEnd, hit.position);
                      var end = hit.position + hit.length;
                      result += '<b class="search-keyword">' + text.substring(hit.position, end) + '</b>';
                      prevEnd = end;
                    });
                    result += text.substring(prevEnd, slice.end);
                    return result;
                  }

                  var resultItem = '';

                  if (slicesOfTitle.length != 0) {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + highlightKeyword(title, slicesOfTitle[0]) + "</a>";
                  } else {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + title + "</a>";
                  }

                  slicesOfContent.forEach(function (slice) {
                    resultItem += "<a href='" + articleUrl + "'>" +
                      "<p class=\"search-result\">" + highlightKeyword(content, slice) +
                      "...</p>" + "</a>";
                  });

                  resultItem += "</li>";
                  resultItems.push({
                    item: resultItem,
                    searchTextCount: searchTextCount,
                    hitCount: hitCount,
                    id: resultItems.length
                  });
                }
              })
            };
            if (keywords.length === 1 && keywords[0] === "") {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-search fa-5x" /></div>'
            } else if (resultItems.length === 0) {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-frown-o fa-5x" /></div>'
            } else {
              resultItems.sort(function (resultLeft, resultRight) {
                if (resultLeft.searchTextCount !== resultRight.searchTextCount) {
                  return resultRight.searchTextCount - resultLeft.searchTextCount;
                } else if (resultLeft.hitCount !== resultRight.hitCount) {
                  return resultRight.hitCount - resultLeft.hitCount;
                } else {
                  return resultRight.id - resultLeft.id;
                }
              });
              var searchResultList = '<ul class=\"search-result-list\">';
              resultItems.forEach(function (result) {
                searchResultList += result.item;
              })
              searchResultList += "</ul>";
              resultContent.innerHTML = searchResultList;
            }
          }

          if ('auto' === 'auto') {
            input.addEventListener('input', inputEventFunction);
          } else {
            $('.search-icon').click(inputEventFunction);
            input.addEventListener('keypress', function (event) {
              if (event.keyCode === 13) {
                inputEventFunction();
              }
            });
          }

          // remove loading animation
          $(".local-search-pop-overlay").remove();
          $('body').css('overflow', '');

          proceedsearch();
        }
      });
    }

    // handle and trigger popup window;
    $('.popup-trigger').click(function(e) {
      e.stopPropagation();
      if (isfetched === false) {
        searchFunc(path, 'local-search-input', 'local-search-result');
      } else {
        proceedsearch();
      };
    });

    $('.popup-btn-close').click(onPopupClose);
    $('.popup').click(function(e){
      e.stopPropagation();
    });
    $(document).on('keyup', function (event) {
      var shouldDismissSearchPopup = event.which === 27 &&
        $('.search-popup').is(':visible');
      if (shouldDismissSearchPopup) {
        onPopupClose();
      }
    });
  </script>
